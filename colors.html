        #lightbox-close { position: absolute; top: 2rem; right: 2rem; color: white; font-size: 2rem; cursor: pointer; background: none; border: none; }

    <script>
        // 补充移动端菜单脚本
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeMenuBtn = document.getElementById('close-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        function toggleMenu() {
            mobileMenu.classList.toggle('translate-x-full');
            document.body.style.overflow = mobileMenu.classList.contains('translate-x-full') ? '' : 'hidden';
        }

        if(mobileMenuBtn && closeMenuBtn) {
            mobileMenuBtn.addEventListener('click', toggleMenu);
            closeMenuBtn.addEventListener('click', toggleMenu);
        }

        const colorData = [
            { filename: 'insp_0001_Sugar-Dust-_-0011_white.jpg', color: 'Sugar Dust | 0011', tags: ['whites'] },
            { filename: 'insp_0002_Polished-Cotton-0629-walls-Fire-Dance-0799-table.jpg', color: 'Polished Cotton | 0629 / Fire Dance | 0799', tags: ['grays', 'oranges', 'blues'] },
            { filename: 'insp_0003_Cotton-Ball-0007-walls-Dreaming-of-The-Day-0470-dresser.jpg', color: 'Cotton Ball | 0007 / Dreaming of The Day | 0470', tags: ['whites'] },
            { filename: 'insp_0004_Coin-Purse-0896-siding-Casa-Blanca-0008-trim-_-yellow.jpg', color: 'Coin Purse | 0896 / Casa Blanca | 0008', tags: ['yellows', 'whites'] },
            { filename: 'inspiration_0000_Melting-Glacier-0600.jpg', color: 'Melting Glacier | 0600', tags: ['grays', 'blues'] },
            { filename: 'inspiration_0001_Deep-Space-0487-_-1.jpg', color: 'Deep Space | 0487', tags: ['blacks', 'blues'] },
            { filename: 'inspiration_0003_Copy-of-Sugar-Dust-0011-3.jpg', color: 'Sugar Dust | 0011', tags: ['whites'] },
            { filename: 'inspiration_0004_Copy-of-Mystic-Fog-0019.jpg', color: 'Mystic Fog | 0019', tags: ['grays'] },
            { filename: 'inspiration_0005_Acapulco-Dive-0639.jpg', color: 'Acapulco Dive | 0639', tags: ['aquas', 'blues'] },
            { filename: 'inspire_0000_Miller-JULY21-Allies-House02.jpg.jpg', color: 'Exterior Design', tags: ['whites', 'grays'] },
            { filename: 'inspire_0001_Miller-JULY21-Allies-House04.jpg.jpg', color: 'Exterior Design', tags: ['whites', 'grays'] },
            { filename: 'inspire_0002_Miller-JULY21-Allies-House07.jpg.jpg', color: 'Exterior Design', tags: ['whites', 'grays'] },
            { filename: 'inspire_0016_Miller-JUNE21-Shannon-DIYs07.jpg.jpg', color: 'Bedroom Design', tags: ['pinks'] },
            { filename: 'inspire_0017_Miller-JUNE21-Shannon-DIYs35.jpg.jpg', color: 'Interior Cabinets', tags: ['greens'] },
            { filename: 'inspo_0000_-Happy-Tune-_-0648-bookshelf-Beryl-Pearl-_-0509-walls-_-gray-and-blue.jpg.jpg', color: 'Happy Tune | 0648 / Beryl Pearl | 0509', tags: ['greens', 'yellows'] },
            { filename: 'inspo_0003_Georgia-on-my-Mind-0361-_-green-.jpg.jpg', color: 'Georgia on my Mind | 0361', tags: ['oranges'] },
            { filename: 'inspo_0004_Happy-Tune-0648.jpg.jpg', color: 'Happy Tune | 0648', tags: ['greens', 'yellows'] },
            { filename: 'inspo_0005_Into-The-Stratosphere-0627-_-blue.jpg.jpg', color: 'Into The Stratosphere | 0627', tags: ['blues'] },
            { filename: 'inspo_0010_Silky-Mint-0720-_-green.jpg.jpg', color: 'Silky Mint | 0720', tags: ['greens', 'aquas'] },
            { filename: 'inspo_0011_Wafer-E0119-bricks-Casper-White-E0157-trim-_-white.jpg.jpg', color: 'Wafer | E0119 / Casper White | E0157', tags: ['browns', 'whites'] },
            { filename: 'inspriration_0000_-Kingdom-Keys-2.jpg.jpg', color: 'Kingdom\'s Keys | 0160', tags: ['yellows'] },
            { filename: 'inspriration_0001_-Smoky-Day-0491.jpg.jpg', color: 'Smoky Day | 0491', tags: ['grays', 'blues'] },
            { filename: 'inspriration_0003_Black-Licorice-0529_Door.jpg.jpg', color: 'Black Licorice | 0529', tags: ['blacks'] },
            { filename: 'inspriration_0005_Calm-Thoughts-0698.jpg.jpg', color: 'Calm Thoughts | 0698', tags: ['aquas'] },
            { filename: 'inspriration_0008_Dave_s-Den-0420.jpg.jpg', color: 'Dave\'s Den | 0420', tags: ['blacks'] },
            { filename: '0000_Deep-Space-0487-2.jpg', color: 'Deep Space | 0487', tags: ['blacks', 'blues'] },
            { filename: 'blue2_0001_Polar-Pond-0492.jpg.jpg', color: 'Polar Pond | 0492', tags: ['aquas', 'blues'] },
            { filename: 'insp_0000_White-Kitten-0022-siding-Soft-Blue-0651-trim-Chic-Shade-0745-door-.jpg', color: 'White Kitten | 0022', tags: ['whites'] }
        ];

        const galleryContainer = document.getElementById('gallery-container');

        function renderGallery() {
            let htmlContent = '';
            colorData.forEach(item => {
                const tagClasses = item.tags.join(' ');
                htmlContent += `
                    <div class="color-card ${tagClasses}" data-tags="${tagClasses}" onclick="openLightbox('${item.filename}', '${item.color}')">
                        <img src="${item.filename}" loading="lazy">
                        <div class="card-info">${item.color}</div>
                    </div>
                `;
            });
            galleryContainer.innerHTML = htmlContent;
        }

        function filterColors(category, clickedBtn) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            clickedBtn.classList.add('active');

            const cards = document.querySelectorAll('.color-card');
            cards.forEach(card => {
                const tags = card.getAttribute('data-tags');
                if (category === 'all' || tags.includes(category)) {
                    card.classList.remove('hidden-card');
                } else {
                    card.classList.add('hidden-card');
                }
            });
        }

        function openLightbox(src, caption) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox-caption').innerText = caption;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        window.onload = renderGallery;
    </script>
