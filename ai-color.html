<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能色彩顾问 | 蜜乐涂料 Miller Paint</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans SC', sans-serif; background-color: #faf9f6; }
        .option-card.selected { border-color: #1e3a8a; background-color: #eff6ff; color: #1e3a8a; }
        .loader-bar { width: 0%; height: 2px; background-color: #1e3a8a; transition: width 0.5s ease; }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <nav class="fixed w-full z-[100] flex justify-between items-center px-8 py-5 bg-white shadow-sm border-b">
        <div class="flex flex-col">
            <a href="index.html" class="text-2xl font-bold tracking-tighter text-blue-900">MILLER PAINT</a>
        </div>
        <div class="hidden lg:flex space-x-6 text-sm font-bold">
            <a href="ai-color.html" class="text-blue-900 border-b-2 border-blue-900">AI 色彩顾问</a>
            <a href="products.html">产品中心</a>
            <a href="contact.html">联系我们</a>
        </div>
        <a href="contact.html" class="bg-slate-900 text-white px-6 py-2 text-sm font-bold">获取样漆</a>
    </nav>

    <section class="relative pt-40 pb-20 text-center bg-slate-800 text-white">
        <h1 class="text-4xl font-bold mb-4">描绘心中的理想空间</h1>
        <p class="opacity-80">智能顾问为您匹配专属的色彩、光泽及涂料系统</p>
    </section>

    <section class="py-12 px-6 max-w-4xl mx-auto" id="interaction-section">
        <div class="flex justify-center mb-10">
            <div class="bg-slate-100 p-1 rounded-full inline-flex">
                <button id="tab-quiz" onclick="switchMode('quiz')" class="px-6 py-2 text-sm font-bold rounded-full bg-blue-900 text-white shadow">引导选择</button>
                <button id="tab-ai" onclick="switchMode('ai')" class="px-6 py-2 text-sm font-bold rounded-full text-slate-500">AI 定制</button>
            </div>
        </div>

        <div id="quiz-container" class="bg-white p-8 rounded-3xl shadow-sm border">
            <h3 class="text-xl font-bold mb-6 text-center">1. 您计划涂刷哪个空间？</h3>
            <div class="grid grid-cols-4 gap-4 mb-8">
                <button class="option-card p-4 border rounded-xl" onclick="selectOption(1, 'living', this)">客厅</button>
                <button class="option-card p-4 border rounded-xl" onclick="selectOption(1, 'bedroom', this)">卧室</button>
                <button class="option-card p-4 border rounded-xl" onclick="selectOption(1, 'bathroom', this)">厨卫</button>
                <button class="option-card p-4 border rounded-xl" onclick="selectOption(1, 'kids', this)">儿童房</button>
            </div>
            <div class="text-center"><button id="submit-btn" class="bg-slate-200 px-10 py-3 rounded-full font-bold pointer-events-none" onclick="generateResult()">生成方案</button></div>
        </div>

        <div id="ai-container" class="hidden bg-white p-8 rounded-3xl shadow-sm border">
            <textarea id="userInput" rows="5" class="w-full p-4 border rounded-xl bg-slate-50 outline-none focus:border-blue-900" placeholder="例如：儿童房想要柔和的绿色，且家有小孩需要耐擦洗..."></textarea>
            <div class="text-center mt-6"><button class="bg-blue-900 text-white px-10 py-3 rounded-full font-bold shadow-lg" onclick="askAI()">深度演算方案</button></div>
        </div>
    </section>

    <section id="loading-section" class="hidden py-20 text-center"><div class="w-64 mx-auto bg-slate-200 h-1 rounded-full overflow-hidden"><div class="loader-bar" id="loader"></div></div></section>

    <section id="ai-result-section" class="hidden pb-20 px-6 max-w-6xl mx-auto">
        <div class="bg-white rounded-[40px] shadow-2xl overflow-hidden flex flex-col md:flex-row border">
            <div class="md:w-1/2 relative h-[400px] md:h-auto bg-white overflow-hidden">
                <img id="ai-dynamic-base" src="ai-blank-living.jpg" class="absolute inset-0 w-full h-full object-cover">
                <div id="ai-dynamic-overlay" class="absolute inset-0 mix-blend-multiply transition-colors duration-1000" style="-webkit-mask-size: cover; mask-size: cover;"></div>
                <div id="ai-hex-badge" class="hidden absolute top-6 right-6 bg-white/90 px-3 py-1 text-xs font-bold rounded-full shadow flex items-center gap-2">
                    <div id="ai-hex-dot" class="w-2 h-2 rounded-full"></div><span id="ai-hex-text">#000000</span>
                </div>
            </div>
            <div class="md:w-1/2 p-10 md:p-16 flex flex-col justify-center">
                <h4 class="text-blue-900 font-bold text-xs mb-4 tracking-widest uppercase">AI Custom Solution</h4>
                <div id="ai-response-text" class="text-slate-600 leading-relaxed space-y-4 text-sm"></div>
                <button class="mt-8 text-xs text-slate-400 font-bold" onclick="location.reload()">↺ 重新测试</button>
            </div>
        </div>
    </section>

    <script>
        function switchMode(m){
            document.getElementById('quiz-container').classList.toggle('hidden', m==='ai');
            document.getElementById('ai-container').classList.toggle('hidden', m==='quiz');
            document.getElementById('tab-quiz').className = m==='quiz' ? "px-6 py-2 text-sm font-bold rounded-full bg-blue-900 text-white shadow" : "px-6 py-2 text-sm font-bold rounded-full text-slate-500";
            document.getElementById('tab-ai').className = m==='ai' ? "px-6 py-2 text-sm font-bold rounded-full bg-blue-900 text-white shadow" : "px-6 py-2 text-sm font-bold rounded-full text-slate-500";
        }

        let step1 = '';
        function selectOption(s, v, b){
            step1 = v;
            document.querySelectorAll('.option-card').forEach(o => o.classList.remove('selected'));
            b.classList.add('selected');
            const btn = document.getElementById('submit-btn');
            btn.className = "bg-blue-900 text-white px-10 py-3 rounded-full font-bold shadow-lg cursor-pointer";
            btn.classList.remove('pointer-events-none');
        }

        async function askAI(){
            const input = document.getElementById('userInput').value.trim();
            if(!input) return alert("请输入需求");

            let base = 'ai-blank-living.jpg', mask = 'ai-mask-living.png';
            if(input.match(/卧|睡/)) { base='ai-blank-bed.jpg'; mask='ai-mask-bed.png'; }
            else if(input.match(/厨|卫/)) { base='ai-blank-bath.jpg'; mask='ai-mask-bath.png'; }
            else if(input.match(/儿童|孩/)) { base='ai-blank-kids.jpg'; mask='ai-mask-kids.png'; }

            document.getElementById('ai-dynamic-base').src = base;
            const overlay = document.getElementById('ai-dynamic-overlay');
            overlay.style.webkitMaskImage = `url('${mask}')`;
            overlay.style.maskImage = `url('${mask}')`;

            document.getElementById('interaction-section').classList.add('hidden');
            document.getElementById('loading-section').classList.remove('hidden');
            document.getElementById('loader').style.width = '100%';

            try {
                const res = await fetch("https://color-advisor.gm7520899.workers.dev", {
                    method: "POST",
                    body: JSON.stringify({userMessage: input})
                });
                const data = await res.json();
                document.getElementById('loading-section').classList.add('hidden');
                document.getElementById('ai-result-section').classList.remove('hidden');
                document.getElementById('ai-response-text').innerHTML = data.reply.replace(/\n/g, '<br>');

                const hex = data.reply.match(/#[0-9A-Fa-f]{6}/);
                if(hex){
                    overlay.style.backgroundColor = hex[0];
                    document.getElementById('ai-hex-badge').classList.remove('hidden');
                    document.getElementById('ai-hex-dot').style.backgroundColor = hex[0];
                    document.getElementById('ai-hex-text').innerText = hex[0].toUpperCase();
                }
            } catch(e) { alert("接口异常"); location.reload(); }
        }
    </script>
</body>
</html>
